<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ComicTactics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06070f;
      overflow: hidden;
      font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
    }
    #canvas { display: block; }

    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── 상단 HUD ── */
    #hud {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 28px; align-items: center;
      background: rgba(28,24,44,0.88);
      padding: 11px 32px; border-radius: 16px;
      border: 1px solid rgba(200,160,80,0.35);
      box-shadow: 0 6px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,160,80,0.1);
      pointer-events: none;
    }
    .hud-sep { width: 1px; height: 20px; background: rgba(200,160,80,0.25); }
    .hud-item {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
    }
    .hud-item .hud-key {
      color: #a090c0; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500;
    }
    .hud-item .hud-val {
      color: #ffe066; font-size: 22px; font-weight: 700; line-height: 1;
      font-family: 'Black Han Sans', sans-serif;
    }

    /* ── 턴 배너 ── */
    #turn-banner {
      position: fixed; top: 82px; left: 50%; transform: translateX(-50%);
      color: #e8e0ff; font-size: 14px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase;
      background: rgba(28,24,44,0.80); padding: 6px 22px; border-radius: 10px;
      border: 1px solid rgba(200,160,80,0.2);
      pointer-events: none;
    }

    /* ── 우측 사이드 패널 ── */
    #side-panel {
      position: fixed; right: 0; top: 50%; transform: translateY(-50%);
      width: 220px;
      background: rgba(28,24,44,0.92);
      border-left: 1px solid rgba(200,160,80,0.40);
      border-top: 1px solid rgba(200,160,80,0.25);
      border-bottom: 1px solid rgba(200,160,80,0.25);
      border-radius: 18px 0 0 18px;
      padding: 18px 14px 16px;
      display: flex; flex-direction: column; gap: 12px;
      pointer-events: all;
      backdrop-filter: blur(14px);
      max-height: 92vh;
      box-shadow:
        -6px 0 40px rgba(0,0,0,0.45),
        0 0 0 1px rgba(200,160,80,0.08) inset;
    }

    /* 패널 상단 타이틀 */
    #hand-label {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      color: #c8a840; font-size: 11px; letter-spacing: 0.14em;
      text-transform: uppercase; font-weight: 700;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(200,160,80,0.25);
    }
    #hand-label::before,
    #hand-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,160,80,0.35));
    }
    #hand-label::after { transform: scaleX(-1); }

    /* 카드 그리드 */
    #hand-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      overflow-y: auto;
      max-height: 52vh;
    }
    #hand-cards::-webkit-scrollbar { width: 3px; }
    #hand-cards::-webkit-scrollbar-thumb {
      background: rgba(200,160,80,0.4); border-radius: 2px;
    }

    /* 카드 */
    .card {
      width: 100%; aspect-ratio: 3/4;
      border-radius: 11px;
      border: 1.5px solid rgba(255,255,255,0.14);
      background: rgba(44,38,62,0.70);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      cursor: grab;
      transition: border-color 0.18s, transform 0.15s, box-shadow 0.18s;
      user-select: none; position: relative; overflow: hidden;
    }
    .card::after {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    }
    .card:hover {
      border-color: rgba(255,255,255,0.38);
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .card.selected {
      border-color: #ffd700;
      transform: translateY(-3px) scale(1.06);
      box-shadow: 0 0 18px rgba(255,215,0,0.42), 0 8px 24px rgba(0,0,0,0.45);
    }
    .card .card-icon { font-size: 28px; }
    .card .card-name {
      font-size: 10px; color: #b0a8c8; font-weight: 700;
      letter-spacing: 0.04em; text-align: center;
    }
    .card .card-level {
      position: absolute; top: 5px; right: 7px;
      font-size: 11px; color: #ffd700; font-weight: 700;
      font-family: 'Black Han Sans', sans-serif;
    }

    /* 타입별 카드 색상 */
    .card[data-type="attacker"] {
      border-color: rgba(255,90,90,0.50);
      background: rgba(60,30,38,0.72);
    }
    .card[data-type="healer"] {
      border-color: rgba(60,220,110,0.50);
      background: rgba(24,52,36,0.72);
    }
    .card[data-type="piercer"] {
      border-color: rgba(60,150,255,0.50);
      background: rgba(22,36,62,0.72);
    }
    .card[data-type="attacker"].selected {
      border-color: #ff5050;
      box-shadow: 0 0 18px rgba(255,80,80,0.45), 0 8px 24px rgba(0,0,0,0.45);
    }
    .card[data-type="healer"].selected {
      border-color: #40ef80;
      box-shadow: 0 0 18px rgba(64,239,128,0.45), 0 8px 24px rgba(0,0,0,0.45);
    }
    .card[data-type="piercer"].selected {
      border-color: #50a8ff;
      box-shadow: 0 0 18px rgba(80,168,255,0.45), 0 8px 24px rgba(0,0,0,0.45);
    }

    /* 액션 버튼 영역 */
    #action-buttons {
      display: flex; flex-direction: column; gap: 7px;
      border-top: 1px solid rgba(200,160,80,0.22);
      padding-top: 12px;
    }
    .btn {
      width: 100%; padding: 11px 0; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.04em;
      font-family: 'Noto Sans KR', sans-serif;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: rgba(255,255,255,0.18);
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: scale(0.97) translateY(0); filter: brightness(0.95); }
    .btn-confirm {
      background: linear-gradient(135deg, #c49b00 0%, #ffd700 50%, #e8c000 100%);
      color: #1a1200;
      box-shadow: 0 3px 12px rgba(255,215,0,0.28), 0 1px 3px rgba(0,0,0,0.3);
    }
    .btn-draw {
      background: linear-gradient(135deg, #1a4fa8 0%, #2d6ddd 50%, #4a8eef 100%);
      color: #e8f0ff;
      box-shadow: 0 3px 12px rgba(45,109,221,0.28), 0 1px 3px rgba(0,0,0,0.3);
    }
    .btn-draw:disabled {
      background: linear-gradient(135deg, #181820, #1e1e2c);
      color: #3a3a4a; cursor: not-allowed;
      box-shadow: none; transform: none; filter: none;
    }
    .btn-unlock {
      background: linear-gradient(135deg, #3d1072 0%, #6a24b8 50%, #8b40d8 100%);
      color: #e8d8ff;
      box-shadow: 0 3px 12px rgba(106,36,184,0.28), 0 1px 3px rgba(0,0,0,0.3);
    }
    .btn-unlock:disabled {
      background: linear-gradient(135deg, #181820, #1e1e2c);
      color: #3a3a4a; cursor: not-allowed;
      box-shadow: none; transform: none; filter: none;
    }

    /* ── 드로우 패널 ── */
    #draw-panel {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(28,24,44,0.98);
      border: 1px solid rgba(200,160,80,0.45);
      border-radius: 20px; padding: 28px; min-width: 340px;
      display: none; z-index: 100; text-align: center;
      pointer-events: all;
      box-shadow: 0 20px 60px rgba(0,0,0,0.65), 0 0 0 1px rgba(200,160,80,0.08) inset;
    }
    #draw-panel h2 {
      color: #ffe066; margin-bottom: 20px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 22px; letter-spacing: 0.06em;
    }
    #draw-result {
      display: flex; gap: 14px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .draw-card {
      width: 86px; height: 108px; border-radius: 12px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      border: 1.5px solid rgba(255,255,255,0.22);
      background: rgba(44,38,62,0.75);
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .draw-card:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .draw-card .card-icon { font-size: 34px; }
    .draw-card .card-name { font-size: 12px; color: #c0b0d8; font-weight: 700; }
    .btn-close-draw {
      background: rgba(44,38,62,0.90);
      color: #c8c0e0; border: 1px solid rgba(200,160,80,0.25);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* ── 합성 힌트 ── */
    #merge-hint {
      position: fixed; bottom: 28px; right: 236px;
      background: linear-gradient(135deg, rgba(30,22,0,0.88), rgba(40,30,0,0.88));
      border: 1px solid rgba(255,215,0,0.45);
      color: #ffd700; font-size: 12px; font-weight: 700;
      padding: 8px 18px; border-radius: 10px;
      display: none; pointer-events: none;
      white-space: nowrap; letter-spacing: 0.04em;
      box-shadow: 0 4px 16px rgba(255,215,0,0.15);
    }

    /* ── 게임 오버 / 클리어 ── */
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.82);
      display: none; align-items: center; justify-content: center;
      z-index: 200; pointer-events: all;
      backdrop-filter: blur(4px);
    }
    #overlay-box { text-align: center; color: #fff; }
    #overlay-box h1 {
      font-size: 56px; margin-bottom: 14px;
      font-family: 'Black Han Sans', sans-serif;
      letter-spacing: 0.08em;
      text-shadow: 0 0 40px rgba(255,80,80,0.6);
    }
    #overlay-box p {
      font-size: 18px; color: #8090a0; margin-bottom: 28px; font-weight: 500;
    }
    .btn-restart {
      background: linear-gradient(135deg, #c49b00, #ffd700);
      color: #1a1200; font-size: 16px; padding: 14px 40px;
      border-radius: 12px; font-weight: 700;
      box-shadow: 0 6px 24px rgba(255,215,0,0.3);
    }

    /* ── 툴팁 ── */
    #tooltip {
      position: fixed; pointer-events: none;
      background: rgba(28,24,44,0.96);
      color: #e0d8f8;
      font-size: 13px; padding: 10px 14px; border-radius: 10px;
      border: 1px solid rgba(70,110,210,0.35);
      display: none; z-index: 300; line-height: 1.8;
      white-space: nowrap;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    }
    #tooltip .tooltip-title {
      font-weight: 700; font-size: 14px; margin-bottom: 4px;
      color: #ff9988; letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-item">
      <span class="hud-key">Wave</span>
      <span class="hud-val" id="hud-wave">1</span>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-item">
      <span class="hud-key">티켓</span>
      <span class="hud-val" id="hud-tickets">0</span>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-item">
      <span class="hud-key">처치</span>
      <span class="hud-val" id="hud-kills">0</span>
    </div>
  </div>
  <div id="turn-banner">── 배치 턴 ──</div>

  <div id="side-panel">
    <div id="hand-label">패 · 드래그해서 배치</div>
    <div id="hand-cards"></div>
    <div id="action-buttons">
      <button class="btn btn-unlock" id="btn-unlock">해금 🎟️ 3</button>
      <button class="btn btn-draw" id="btn-draw">드로우 🎟️ 1</button>
      <button class="btn btn-confirm" id="btn-confirm">⚔️ 턴 종료</button>
    </div>
  </div>

  <div id="merge-hint">같은 캐릭터 2개를 같은 칸에 배치하면 합성!</div>
</div>

<!-- 드로우 패널 -->
<div id="draw-panel">
  <h2>캐릭터 드로우</h2>
  <div id="draw-result"></div>
  <button class="btn btn-close-draw" id="btn-close-draw">패에 추가</button>
</div>

<!-- 게임 오버 / 클리어 -->
<div id="overlay" id="overlay">
  <div id="overlay-box">
    <h1 id="overlay-title">GAME OVER</h1>
    <p id="overlay-msg">모든 캐릭터가 쓰러졌습니다.</p>
    <button class="btn btn-restart" id="btn-restart">다시 시작</button>
  </div>
</div>

<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script>
  window.addEventListener('error', e => {
    const box = document.createElement('div');
    box.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#200;color:#f88;padding:20px;border-radius:8px;z-index:9999;max-width:80vw;white-space:pre-wrap;font-family:monospace;font-size:13px;border:1px solid #f44';
    box.textContent = '에러: ' + e.message + '\n파일: ' + e.filename + '\n라인: ' + e.lineno;
    document.body.appendChild(box);
  });
  window.addEventListener('unhandledrejection', e => {
    const box = document.createElement('div');
    box.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#200;color:#f88;padding:20px;border-radius:8px;z-index:9999;max-width:80vw;white-space:pre-wrap;font-family:monospace;font-size:13px;border:1px solid #f44';
    box.textContent = '비동기 에러: ' + (e.reason?.message || e.reason || '알 수 없음') + '\n' + (e.reason?.stack || '');
    document.body.appendChild(box);
  });
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
